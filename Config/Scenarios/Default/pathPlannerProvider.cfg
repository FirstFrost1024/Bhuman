// PathPlannerProvider：基于可视图的路径规划模块参数（单位一般为毫米 mm）。
//
// goalPostDistance — 绕行球门柱时，在场地球门柱半径之外额外保留的绕行距离。
// uprightRobotRadius — 站立状态机器人的绕行半径（障碍物圆半径）。
// fallenRobotRadius — 倒地机器人的绕行半径。
// readyRobotRadius — Ready 状态下机器人的绕行半径。
// centerCircleDistance — 非零且中圈处于非法/预期非法区域时：绕行中圈的障碍半径 = 本值 + 场地中圈半径；为 0 则不添加该中圈障碍节点。
// penaltyAreaRadius — 绕行己方/对方禁区角点（禁区建模）时使用的圆半径。
// ballDistance — 普通情形下绕行足球时与球心的距离。
// freeKickRadius — 防守任意球时绕行足球的半径。
// wrongBallSideCostFactor — 从球“错误一侧”绕过时的代价因子（相对整圆代价的比例，用于偏向从合适一侧绕球）。
// wrongBallSideRadius — 在球周围多远的区域内会对“错误一侧”绕行施加上述代价惩罚。
// fieldBorderLimit — 边线外仍允许参与行走规划的区域宽度（场地边界向外扩展量）。
// radiusControlOffset — 规划时把障碍圆缩小该值以计划更贴近障碍；执行路径时仍按原始安全距离（规划更紧、执行仍留余量）。
// radiusAvoidanceTolerance — 靠近障碍时在多宽的径向范围内对机器人施加“局部推开”的渐进避让。
// rotationPenalty — 先朝第一个中间目标转动时的代价（毫米/弧度），用于稳定路径选择、减少来回换向。
// switchPenalty — 相对上一帧改变绕第一个障碍物的转向方向时的附加代价（毫米），抑制左右摇摆。
// useFastestWalkLeaderboardBarriers — 是否启用 Fastest Walk 排行榜挑战中的障碍带（挡板线）。

goalPostDistance = 300;
uprightRobotRadius = 500;
fallenRobotRadius = 650;
readyRobotRadius = 550;
centerCircleDistance = 100;
penaltyAreaRadius = 300;
ballDistance = 200;
freeKickRadius = 850;
wrongBallSideCostFactor = 0.25;
wrongBallSideRadius = 400;
fieldBorderLimit = 350;
radiusControlOffset = 100;
radiusAvoidanceTolerance = 100;
rotationPenalty = 150;
switchPenalty = 400;
useFastestWalkLeaderboardBarriers = false;
