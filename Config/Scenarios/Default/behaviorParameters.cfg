// ========== 接球 / 拦截流程（与本文件相关部分）==========
//
// 【触发 FieldInterceptBall（全局场上球员 + 守门员共用）】
// FieldInterceptBallProvider 根据球轨迹与本机轴线交点、终点等判定 interceptBall /
// predictedInterceptBall；其中与本文件相关的量是 ballCatchMaxWalkDistance（球与本机 Y 轴交点的横向偏移须在 ±该距离内才更容易成立）。
// 其它几何与视野门槛见 Config/Scenarios/Default/fieldInterceptBallProvider.cfg。
//
// 【守门员专属接球状态机】HandleGoalkeeperCatchBall.cpp
// - notCatching → preparingCatch：守门员 + 球滚向己方球门 + 见球；且须满足下方 goalkeeperCatch*（距离、球速、横穿 Y 轴剩余时间窗）。
// - preparingCatch → doingCatch：preparingCatch 持续至少约 100ms 且上述条件仍成立。
// - doingCatch：调用技能 InterceptBall，并把 keeperJumpingOn 传给 allowDive；禁区内且不靠门柱一侧时可启用 jumpLeft/jumpRight（侧扑）。
//
// 【执行拦截动作】InterceptBall.cpp（站立 / 走位 / 跪扑 / 侧扑）
// - 根据球与本机 Y 轴交点的横向偏移 positionIntersectionYAxis，与 standRadius、walkRadius（随 timeUntilIntersectsOwnYAxis 在 timeForInterceptionForMaxWalkRadius 上映射）、genuflectStandRadius、jumpRadius 比较，依次尝试站位→走位→跪扑→侧扑。
// - timeForJump（毫秒）：若「距横穿 Y 轴的剩余时间」×1000 < timeForJump，则认为再跳已太晚，强制改用走位（replaceJumpWithWalk），避免扑空。
//
// 【与本流程无关的本文件项】罚球射门角度与障碍物见 penalty*；复位后通信/技能延时见文件末尾三项。
//

keeperJumpingOn = true; // 守门员接球时是否允许真侧扑（false 则 InterceptBall 里跳会变成语音提示而不倒地）

// HandleGoalkeeperCatchBall：更近 / 更快 / 更晚 再开始扑救准备（可调）
goalkeeperCatchMaxDistance = 2200; // mm；球相对距离须小于此值（原约 3000，降低则更近才触发）
goalkeeperCatchMinBallSpeed = 150; // mm/s，|velocityRelative| 下限；0 表示关闭速度门槛
goalkeeperCatchEnterTimeUntilYAxis = { min = 0.15; max = 2; }; // s；进入准备态的横穿 Y 轴剩余时间（max 越小越晚反应）
goalkeeperCatchHoldTimeUntilYAxis = { min = 0.08; max = 2.5; }; // s；准备态内须保持的时间窗

penaltyStrikerAngleToLeftPostOffset = 10deg;
penaltyStrikerAngleToRightPostOffset = 10deg;
penaltyStrikerUseObstacles = true;
defaultLookDownAngle = 20deg;

// 拦截判定：球轨迹与本机 Y 轴交点的 |y| 须不超过该距离（毫米）；过小难触发 interceptBall，过大易在太远也来拦截
ballCatchMaxWalkDistance = 1200;

// InterceptBall：仅用原地站姿可覆盖的横向范围（毫米，交点距机身中线 ±standRadius）
standRadius = 60;

// InterceptBall：走位拦截允许的横向范围上下限（毫米）；实际半径由下一项时间在 [min,max] 上线性映射
walkRadius = { min = 250; max = 500; };

// InterceptBall：球到达 Y 轴的剩余时间（秒）从 min→max 时，走位可用半径从 walkRadius.min 放宽到 walkRadius.max（剩时间越长可走越远）
timeForInterceptionForMaxWalkRadius = { min = 0.3; max = 1.4; };

genuflectRadius = 200; // 守门员站位策略 Goalkeeper.cpp 中与扑救张开角度相关的尺度（毫米），非 InterceptBall 直接读取

// InterceptBall：跪地扑救（genuflect）允许的横向范围（毫米）
genuflectStandRadius = 200;

// InterceptBall：超出走位/跪扑范围但仍可选用侧扑跳一侧的最大横向阈值（毫米）；与 jumpLeft/jumpRight 分支配对
jumpRadius = 600;

// InterceptBall：跳跃从开始到「能持球」的经验时间（毫秒）；剩余横穿时间小于该值则不再选跳改走位
timeForJump = 500;

noCommunicationAfterUnpenalizedTime = 3000;
noSkillRequestAfterUnpenalizedTime = 3500;
lookAroundAfterUnpenalizedTime = 4000;
